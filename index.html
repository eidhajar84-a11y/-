<!DOCTYPE html>
<html>
<head>
<title>افتحني</title>
<style>
body {
  text-align: center;
  background-color: #000;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

button {
  padding: 15px 25px;
  font-size: 20px;
  background-color: #ff0055;
  border: none;
  border-radius: 10px;
  color: white;
  position: absolute;
}

#kiss {
  display: none;
  font-size: 100px;
  margin-top: 100px;
}

#msg {
  display: none;
  margin-top: 20px;
  font-size: 26px;
}
</style>
</head>

<body>

<h1>افتحني</h1>

<button id="btn" onmouseover="moveButton()" onclick="showKiss()">دوس هنا</button>

<div id="kiss">💋💋💋</div>

<div id="msg">
  <p>بحبك</p>
</div>

<script>
function moveButton() {
  var btn = document.getElementById("btn");
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}

function showKiss() {
  document.getElementById("kiss").style.display = "block";

  setTimeout(function() {
    document.getElementById("msg").style.display = "block";
  }, 1000);
}
</script>

</body>
</html>
